<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ashraf Salon - POS System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        @media print {
            /* 1. Screen ki baaki saari cheezein chupao */
            body * { visibility: hidden; }
            
            /* 2. Sirf Bill Area ko dikhao */
            #capture-bill-area, #capture-bill-area * { visibility: visible; }
            
            /* 3. Bill ko top-left me set karo aur Thermal Size (80mm) do */
            #capture-bill-area {
                position: absolute;
                left: 0;
                top: 0;
                width: 80mm; /* Standard Thermal Printer Width */
                margin: 0;
                padding: 10px;
                box-shadow: none;
                border: none;
                font-family: monospace; /* Thermal print ke liye best font */
                color: black;
            }
            
            /* 4. Print me manual discount input box na dikhe, sirf text dikhe */
            .hide-on-print { display: none !important; }
            .show-on-print { display: inline !important; }
        }
    </style>
</head>
<body class="bg-gray-100 font-sans text-gray-800">

    <div id="login-page" class="min-h-screen flex items-center justify-center">
        <div class="bg-white p-8 rounded-lg shadow-lg w-96 border-t-4 border-blue-600">
            <h2 class="text-3xl font-bold text-center text-gray-800 mb-2">Ashraf Salon</h2>
            <p class="text-center text-gray-500 mb-6">Staff Login Panel</p>
            
            <input type="text" id="username" placeholder="Login ID (e.g., ashraf_wakad)" class="w-full p-3 border rounded mb-4 bg-gray-50 focus:ring-2 focus:ring-blue-500 outline-none">
            <input type="password" id="password" placeholder="Password" class="w-full p-3 border rounded mb-6 bg-gray-50 focus:ring-2 focus:ring-blue-500 outline-none">
            
            <button onclick="handleLogin()" id="login-btn" class="w-full bg-blue-600 text-white p-3 rounded font-bold text-lg hover:bg-blue-700 shadow-md transition">Login to System</button>
            <p id="login-error" class="text-red-500 text-sm mt-3 text-center font-semibold hidden"></p>
        </div>
    </div>

    <div id="cashier-panel" class="hidden p-4 md:p-6 max-w-6xl mx-auto">
        <div class="flex justify-between items-center bg-white p-4 rounded-lg shadow mb-6 border-l-4 border-blue-600">
            <div>
                <h1 class="text-2xl font-bold text-gray-800">Cashier Desk</h1>
                <p class="text-sm text-blue-600 font-semibold">Branch: <span id="branch-name-display" class="uppercase"></span></p>
            </div>
            <button onclick="location.reload()" class="bg-red-100 text-red-600 px-4 py-2 rounded font-bold hover:bg-red-200 transition">Logout</button>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
            <div class="lg:col-span-7 space-y-6">
                <div class="bg-white p-6 rounded-lg shadow">
                    <h3 class="font-bold text-lg mb-4 text-gray-700 border-b pb-2">1. Customer Details</h3>
                    <div class="grid grid-cols-2 gap-4">
                        <input type="text" id="cust-name" placeholder="Customer Name" class="w-full p-3 border rounded bg-gray-50 outline-none focus:ring-2 focus:ring-blue-500">
                        <input type="number" id="cust-phone" placeholder="WhatsApp Number" class="w-full p-3 border rounded bg-gray-50 outline-none focus:ring-2 focus:ring-blue-500">
                    </div>
                </div>

                <div class="bg-white p-6 rounded-lg shadow">
                    <h3 class="font-bold text-lg mb-4 text-gray-700 border-b pb-2">2. Add Services</h3>
                    <div class="flex gap-4">
                        <select id="service-dropdown" class="flex-1 p-3 border rounded bg-gray-50 font-medium outline-none focus:ring-2 focus:ring-blue-500">
                            <option value="">Loading Services from Server... ⏳</option>
                        </select>
                        <button onclick="addServiceToBill()" class="bg-green-500 text-white px-6 py-3 rounded font-bold hover:bg-green-600 shadow transition">+ Add</button>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-5">
                <div class="bg-white p-6 rounded-lg shadow border-2 border-gray-200">
                    
                    <div id="capture-bill-area" class="bg-white p-4" style="font-family: monospace;">
                        <div class="text-center mb-4 border-b-2 border-dashed border-gray-400 pb-4">
                            <h2 class="text-2xl font-bold text-gray-800">ASHRAF SALON</h2>
                            <p class="text-sm text-gray-600">Branch: <span id="receipt-branch"></span></p>
                            <p class="text-sm text-gray-600" id="receipt-date"></p>
                            <p class="text-xs text-gray-500 mt-1">Invoice: <span id="invoice-id">Pending...</span></p>
                        </div>
                        
                        <div class="mb-4 text-sm">
                            <p><strong>Name:</strong> <span id="receipt-name">-</span></p>
                            <p><strong>Mob:</strong> <span id="receipt-phone">-</span></p>
                        </div>

                        <table class="w-full text-sm mb-4">
                            <thead>
                                <tr class="border-b border-gray-300">
                                    <th class="text-left pb-1">Item</th>
                                    <th class="text-right pb-1">Amount</th>
                                </tr>
                            </thead>
                            <tbody id="bill-items-list"></tbody>
                        </table>

                        <div class="border-t-2 border-dashed border-gray-400 pt-4 text-sm">
                            <div class="flex justify-between mb-1">
                                <span>Subtotal:</span>
                                <span id="ui-subtotal">₹0</span>
                            </div>
                            <div class="flex justify-between items-center mb-1 text-gray-800">
                                <span>Discount (-):</span>
                                <div class="flex items-center hide-on-print">
                                    ₹ <input type="number" id="manual-discount" value="0" class="w-16 ml-1 p-1 border rounded text-right text-black outline-none" onchange="calculateTotal()" onkeyup="calculateTotal()">
                                </div>
                                <span id="receipt-discount-text" class="hidden show-on-print">₹0</span>
                            </div>
                            <div class="flex justify-between font-bold text-lg mt-3 border-t border-gray-300 pt-2">
                                <span>Total Pay:</span>
                                <span id="ui-final-total">₹0</span>
                            </div>
                        </div>
                        <div class="text-center mt-4 text-xs text-gray-500 show-on-print hidden">
                            <p>Thank you for visiting!</p>
                            <p>Please come again.</p>
                        </div>
                    </div>

                    <div class="mt-6 border-t pt-4">
                        <select id="payment-mode" class="w-full p-2 border rounded mb-4 bg-gray-50 outline-none">
                            <option value="Cash">Cash</option>
                            <option value="UPI">UPI (GPay/PhonePe)</option>
                            <option value="Card">Card</option>
                        </select>

                        <button id="save-btn" onclick="saveBillToDatabase()" class="w-full bg-blue-600 text-white p-3 rounded font-bold hover:bg-blue-700 transition mb-3 shadow">💾 1. Save Bill</button>
                        
                        <div id="action-buttons" class="hidden flex gap-2">
                            <button onclick="printThermalBill()" class="flex-1 bg-gray-800 text-white p-3 rounded font-bold hover:bg-gray-900 transition shadow">🖨️ Print Receipt</button>
                            <button onclick="sendTextWhatsApp()" class="flex-1 bg-green-500 text-white p-3 rounded font-bold hover:bg-green-600 transition shadow">📲 Send WA</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 🚀 AAPKA API URL
        const API_URL = "https://script.google.com/macros/s/AKfycbyn97v4rXWze3znY19Q2U-Dyq-Hf2KYHqTFrj2K2d3Mvsvo_TojQqb0IbxhpWkqh9w7/exec";

        let currentBranch = "";
        let loggedInUser = "";
        let billItemsArray = [];
        let billSubtotal = 0;
        let finalInvoiceNumber = "";

        setInterval(() => { document.getElementById('receipt-date').innerText = new Date().toLocaleString('en-IN'); }, 1000);

        async function callBackendAPI(action, data) {
            try {
                let response = await fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: action, ...data })
                });
                return await response.json();
            } catch (error) {
                console.error("API Error:", error);
                throw new Error("Server se connect nahi ho paya! Internet check karein.");
            }
        }

        async function handleLogin() {
            const user = document.getElementById('username').value.trim();
            const pass = document.getElementById('password').value.trim();
            if(!user || !pass) return showLoginError("ID aur Password dono zaruri hain!");

            const btn = document.getElementById('login-btn');
            btn.innerText = "Checking Database...⏳"; 
            btn.disabled = true;

            try {
                let res = await callBackendAPI("login", { username: user, password: pass });
                if(res.success && res.role === "Cashier") {
                    loggedInUser = user;
                    currentBranch = res.branch.toUpperCase();
                    document.getElementById('branch-name-display').innerText = currentBranch;
                    document.getElementById('receipt-branch').innerText = currentBranch;
                    document.getElementById('login-page').classList.add('hidden');
                    document.getElementById('cashier-panel').classList.remove('hidden');
                    fetchServices(); 
                } else if(res.success) {
                    alert(`Welcome ${res.role}! Manager and Owner panels will be added soon.`);
                    btn.innerText = "Login to System"; btn.disabled = false;
                } else {
                    showLoginError(res.message);
                    btn.innerText = "Login to System"; btn.disabled = false;
                }
            } catch (err) {
                showLoginError(err.message);
                btn.innerText = "Login to System"; btn.disabled = false;
            }
        }

        function showLoginError(msg) {
            const errBox = document.getElementById('login-error');
            errBox.innerText = "❌ " + msg;
            errBox.classList.remove('hidden');
        }

        async function fetchServices() {
            try {
                let res = await callBackendAPI("fetchServices", {});
                if(res.success) {
                    const drop = document.getElementById('service-dropdown');
                    drop.innerHTML = '<option value="">-- Select a Service --</option>';
                    res.data.forEach(srv => {
                        let opt = document.createElement('option');
                        opt.value = `${srv.serviceName}|${srv.finalPrice}`;
                        opt.text = `${srv.serviceName} - ₹${srv.finalPrice}`;
                        drop.add(opt);
                    });
                }
            } catch (err) { alert("Services load nahi ho payi. Refresh karein."); }
        }

        function addServiceToBill() {
            const val = document.getElementById('service-dropdown').value;
            if(!val) return;
            const [name, price] = val.split('|');
            billItemsArray.push({name: name, price: parseInt(price)});
            document.getElementById('receipt-name').innerText = document.getElementById('cust-name').value || "Guest";
            document.getElementById('receipt-phone').innerText = document.getElementById('cust-phone').value || "-";
            updateBillUI();
        }

        function updateBillUI() {
            const list = document.getElementById('bill-items-list');
            list.innerHTML = ""; billSubtotal = 0;
            billItemsArray.forEach(item => {
                billSubtotal += item.price;
                list.innerHTML += `<tr><td class="py-1">${item.name}</td><td class="text-right py-1">₹${item.price}</td></tr>`;
            });
            calculateTotal();
        }

        function calculateTotal() {
            document.getElementById('ui-subtotal').innerText = "₹" + billSubtotal;
            let disc = parseInt(document.getElementById('manual-discount').value) || 0;
            document.getElementById('ui-final-total').innerText = "₹" + (billSubtotal - disc);
            document.getElementById('receipt-discount-text').innerText = "₹" + disc; 
        }

        async function saveBillToDatabase() {
            if(billItemsArray.length === 0) return alert("Service add kijiye!");
            if(!document.getElementById('cust-phone').value) return alert("Phone Number zaruri hai!");

            const btn = document.getElementById('save-btn');
            btn.innerText = "Saving Data...⏳"; btn.disabled = true;

            let ts = Math.floor(Date.now() / 1000).toString().substr(4);
            finalInvoiceNumber = `ASH-${currentBranch.substring(0,3)}-${ts}`;
            document.getElementById('invoice-id').innerText = finalInvoiceNumber;

            const billData = {
                date: new Date().toLocaleDateString('en-GB'),
                time: new Date().toLocaleTimeString('en-IN'),
                invoiceNo: finalInvoiceNumber,
                branchName: currentBranch,
                customerName: document.getElementById('cust-name').value,
                customerPhone: document.getElementById('cust-phone').value,
                servicesList: billItemsArray.map(i => i.name).join(", "),
                subtotal: billSubtotal,
                totalDiscount: parseInt(document.getElementById('manual-discount').value) || 0,
                finalAmount: billSubtotal - (parseInt(document.getElementById('manual-discount').value) || 0),
                paymentMode: document.getElementById('payment-mode').value,
                cashierId: loggedInUser
            };

            try {
                let res = await callBackendAPI("saveBill", { billData: billData });
                if(res.success) {
                    btn.classList.add('hidden'); // Hide Save button
                    document.getElementById('action-buttons').classList.remove('hidden'); // Show Print/WA buttons
                } else { 
                    alert("Failed: " + res.message); 
                    btn.innerText = "Save Again"; btn.disabled = false; 
                }
            } catch(err) {
                alert("System Connection Error");
                btn.innerText = "Save Again"; btn.disabled = false;
            }
        }

        // ================= 1. THERMAL PRINT FUNCTION =================
        function printThermalBill() {
            // CSS @media print automatically handles hiding other elements.
            // Just trigger the print dialog!
            window.print();
            
            // Optional: Reload after print
            // setTimeout(() => { location.reload(); }, 2000);
        }

        // ================= 2. TEXT WHATSAPP FUNCTION =================
        function sendTextWhatsApp() {
            let custName = document.getElementById('cust-name').value || "Guest";
            let custPhone = document.getElementById('cust-phone').value;
            let dateStr = new Date().toLocaleString('en-IN');
            let manualDiscount = parseInt(document.getElementById('manual-discount').value) || 0;
            let finalTotal = billSubtotal - manualDiscount;
            
            let itemsText = "";
            billItemsArray.forEach(item => { itemsText += `▪ ${item.name} - ₹${item.price}\n`; });

            let billText = `✂️ *ASHRAF SALON* ✂️\n`
                         + `📍 Branch: ${currentBranch}\n`
                         + `🧾 Invoice: ${finalInvoiceNumber}\n`
                         + `📅 Date: ${dateStr}\n`
                         + `------------------------\n`
                         + `👤 Name: ${custName}\n`
                         + `📱 Mob: ${custPhone}\n`
                         + `------------------------\n`
                         + `*Services:*\n${itemsText}`
                         + `------------------------\n`
                         + `💰 Subtotal: ₹${billSubtotal}\n`
                         + `🎁 Discount: ₹${manualDiscount}\n`
                         + `✅ *Total Paid: ₹${finalTotal}*\n`
                         + `------------------------\n`
                         + `🙏 Thank you for visiting!`;

            let phone = custPhone.length === 10 ? "91" + custPhone : custPhone; 
            window.open(`https://api.whatsapp.com/send?phone=${phone}&text=${encodeURIComponent(billText)}`, '_blank');
        }
    </script>
</body>
</html>
